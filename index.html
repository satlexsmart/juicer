<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juice Center | Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-orange-50 p-4 font-sans">
    <div id="order-screen" class="max-w-md mx-auto mt-4">
        <h1 class="text-3xl font-black text-orange-600 mb-6 text-center">JUICE UP</h1>
        
        <div class="bg-white p-6 rounded-3xl shadow-xl mb-6">
            <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">Select Drink</label>
            <select id="item-select" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 text-lg font-bold border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-orange-500">
                <option>Mango Shake</option>
                <option>Cold Coffee</option>
                <option>Mix Fruit Juice</option>
                <option>Mosambi Special</option>
            </select>
            
            <input id="note-input" type="text" placeholder="Special notes (e.g. no ice)" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-orange-500">
            
            <button onclick="addToCart()" class="w-full py-4 bg-orange-500 text-white rounded-xl font-bold hover:bg-orange-600 transition shadow-md active:scale-95">
                + Add to Tray
            </button>
        </div>

        <div id="cart-container" class="hidden bg-white p-6 rounded-3xl shadow-xl border-t-8 border-orange-500">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-gray-800 uppercase text-sm">Your Tray</h2>
                <span id="total-display" class="font-black text-orange-600 text-lg">₹0</span>
            </div>
            <ul id="cart-list" class="space-y-3 mb-6"></ul>
            
            <button onclick="sendFinalOrder()" class="w-full py-5 bg-green-600 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 transition">
                PLACE ORDER
            </button>
        </div>
    </div>

    <div id="token-screen" class="hidden max-w-md mx-auto bg-white rounded-3xl shadow-2xl p-10 mt-10 text-center border-b-8 border-orange-500">
        <p class="text-gray-400 font-bold uppercase tracking-widest text-xs">Booking Confirmed</p>
        <div id="token-display" class="text-7xl font-black text-orange-600 my-4">#--</div>
        <p class="text-gray-500 text-sm">Please show this screen at the counter.</p>
        <button onclick="location.reload()" class="mt-8 text-orange-500 font-bold text-sm underline">Order more</button>
    </div>

    <script>
        // ⚠️ PASTE YOUR EXACT FIREBASE KEYS HERE ⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyCnwh0cRGZCbjPNTKXtE6xDuBQkx0p5e3g",
            authDomain: "juicer-cf8fc.firebaseapp.com",
            projectId: "juicer-cf8fc",
            storageBucket: "juicer-cf8fc.firebasestorage.app",
            messagingSenderId: "169880056817",
            appId: "1:169880056817:web:28f95611dfc0d5b02c4a50",
            measurementId: "G-RJZG4Z674S"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let cart = [];
        let totalBill = 0; // The calculator memory
        
        // The Price List
        const prices = {
            "Mango Shake": 60,
            "Cold Coffee": 50,
            "Mix Fruit Juice": 40,
            "Mosambi Special": 30
        };

        function addToCart() {
            const item = document.getElementById('item-select').value;
            const note = document.getElementById('note-input').value || "Standard";
            const price = prices[item];
            
            cart.push({ item, note, price });
            totalBill += price; // Update total
            
            document.getElementById('cart-container').classList.remove('hidden');
            document.getElementById('total-display').innerText = "₹" + totalBill;
            
            const li = document.createElement('li');
            li.className = "flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100";
            li.innerHTML = `
                <div>
                    <span class="font-bold text-gray-700 block">${item}</span>
                    <span class="text-xs text-gray-400 italic">${note}</span>
                </div>
                <span class="text-orange-600 font-bold">₹${price}</span>
            `;
            document.getElementById('cart-list').appendChild(li);
            document.getElementById('note-input').value = "";
        }

                        async function sendFinalOrder() {
            if (cart.length === 0) return;

            // 1. Create a reference to a "Master Counter" in the cloud
            const counterRef = db.collection("system").doc("tokenCounter");

            try {
                // 2. Run a "Transaction" to safely get the next number in sequence
                const sequentialToken = await db.runTransaction(async (transaction) => {
                    const counterDoc = await transaction.get(counterRef);

                    let nextNumber = 1; // Start at 1 if this is the first order ever
                    if (counterDoc.exists) {
                        nextNumber = counterDoc.data().lastToken + 1;
                    }

                    // Update the master counter for the next person
                    transaction.set(counterRef, { lastToken: nextNumber });

                    return nextNumber;
                });

                // 3. Save the order using the new sequential token!
                await db.collection("orders").add({
                    token: sequentialToken, // No more random math!
                    items: cart,
                    total: totalBill,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                document.getElementById('order-screen').classList.add('hidden');
                document.getElementById('token-screen').classList.remove('hidden');
                document.getElementById('token-display').innerText = "#" + sequentialToken;

            } catch (error) {
                console.error("Transaction failed: ", error);
                alert("Please try placing your order again.");
            }

    </script>
</body>
</html>
