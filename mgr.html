<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Orders Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="bg-gray-900 text-white p-6 font-sans min-h-screen">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-6">
            <h1 class="text-4xl font-black text-orange-500">LIVE ORDERS</h1>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-gray-400 text-sm font-mono uppercase" id="status-text">Connecting...</span>
            </div>
        </header>

        <div id="order-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        
        <div id="no-orders" class="text-center py-40 text-gray-700 border-4 border-dashed border-gray-800 rounded-3xl">
            <p class="text-2xl font-bold uppercase tracking-widest">Waiting for orders...</p>
        </div>
    </div>

    <audio id="ding" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const PUSHER_KEY = 'e0651c53560aef3e6009';
        const PUSHER_SECRET = '9e6495e65cd91760b544';

        const pusher = new Pusher(PUSHER_KEY, { 
            cluster: 'ap2',
            channelAuthorization: {
                customHandler: (params, callback) => {
                    const stringToSign = params.socketId + ':' + params.channelName;
                    const hash = CryptoJS.HmacSHA256(stringToSign, PUSHER_SECRET);
                    const auth = PUSHER_KEY + ':' + hash.toString(CryptoJS.enc.Hex);
                    callback(null, { auth: auth });
                }
            }
        });

        pusher.connection.bind('connected', () => {
            document.getElementById('status-text').innerText = "System Online";
        });

        const channel = pusher.subscribe('private-orders');

        channel.bind('client-new-order', function(data) {
            document.getElementById('no-orders').classList.add('hidden');
            
            const audio = document.getElementById('ding');
            audio.play().catch(e => console.log("Audio play prevented by browser. Click anywhere on page first."));

            const list = document.getElementById('order-list');
            const card = document.createElement('div');
            card.className = "bg-gray-800 p-6 rounded-3xl border-t-8 border-orange-500 shadow-2xl";
            
            let itemsHTML = data.items.map(i => `
                <li class="flex flex-col border-b border-gray-700 pb-2">
                    <span class="text-xl font-bold text-white">🥤 ${i.item}</span>
                    <span class="text-sm text-orange-300 font-medium italic">${i.note}</span>
                </li>
            `).join('');

            card.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <span class="text-3xl font-black text-orange-500">#${data.token}</span>
                    <span class="text-xs text-gray-500 font-mono">${new Date().toLocaleTimeString()}</span>
                </div>
                <ul class="space-y-4 mb-8">${itemsHTML}</ul>
                <button onclick="this.parentElement.remove()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-black uppercase tracking-widest transition">
                    Served ✅
                </button>
            `;
            
            list.prepend(card);
        });
    </script>
</body>
</html>
