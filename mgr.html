<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Orders Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-900 text-white p-6 font-sans min-h-screen">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-6">
            <h1 class="text-4xl font-black text-orange-500">LIVE ORDERS</h1>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-gray-400 text-sm font-mono uppercase">Cloud Database Active</span>
            </div>
        </header>

        <div id="order-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        
        <div id="no-orders" class="text-center py-40 text-gray-700 border-4 border-dashed border-gray-800 rounded-3xl">
            <p class="text-2xl font-bold uppercase tracking-widest">Waiting for orders...</p>
        </div>
    </div>

    <audio id="ding" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        // ⚠️ PASTE YOUR EXACT FIREBASE KEYS HERE ⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyCnwh0cRGZCbjPNTKXtE6xDuBQkx0p5e3g",
            authDomain: "juicer-cf8fc.firebaseapp.com",
            projectId: "juicer-cf8fc",
            storageBucket: "juicer-cf8fc.firebasestorage.app",
            messagingSenderId: "169880056817",
            appId: "1:169880056817:web:28f95611dfc0d5b02c4a50",
            measurementId: "G-RJZG4Z674S"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("orders").orderBy("timestamp", "desc")
          .onSnapshot((snapshot) => {
              const list = document.getElementById('order-list');
              list.innerHTML = ''; 
              
              if (snapshot.empty) {
                  document.getElementById('no-orders').classList.remove('hidden');
              } else {
                  document.getElementById('no-orders').classList.add('hidden');
              }

              snapshot.forEach((doc) => {
                  const order = doc.data();
                  const card = document.createElement('div');
                  card.className = "bg-gray-800 p-6 rounded-3xl border-t-8 border-orange-500 shadow-2xl mb-4";
                  
                  let itemsHTML = order.items.map(i => `
                      <li class="flex justify-between items-center border-b border-gray-700 pb-2">
                          <div>
                              <span class="text-xl font-bold text-white block">🥤 ${i.item}</span>
                              <span class="text-sm text-orange-300 font-medium italic">${i.note}</span>
                          </div>
                      </li>
                  `).join('');

                  // 💰 Displaying the total bill here!
                  card.innerHTML = `
                      <div class="flex justify-between items-start mb-4">
                          <span class="text-3xl font-black text-orange-500">#${order.token}</span>
                          <span class="bg-green-900 text-green-400 px-3 py-1 rounded-lg font-bold text-xl">₹${order.total || 0}</span>
                      </div>
                      <ul class="space-y-4 mb-8">${itemsHTML}</ul>
                      <button onclick="db.collection('orders').doc('${doc.id}').delete()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-black uppercase tracking-widest transition">
                          Served ✅
                      </button>
                  `;
                  list.appendChild(card);
              });

              if (!snapshot.metadata.fromCache && snapshot.docChanges().some(c => c.type === "added")) {
                  const audio = document.getElementById('ding');
                  audio.play().catch(e => console.log("Click screen first to allow audio"));
              }
          });
    </script>
</body>
</html>
