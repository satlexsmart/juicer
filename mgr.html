<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Orders Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="bg-gray-900 text-white p-6 font-sans min-h-screen">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-6">
            <h1 class="text-4xl font-black text-orange-500">LIVE ORDERS</h1>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-gray-400 text-sm font-mono uppercase" id="status-text">Connecting...</span>
            </div>
        </header>

        <div id="order-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        
        <div id="no-orders" class="text-center py-40 text-gray-700 border-4 border-dashed border-gray-800 rounded-3xl">
            <p class="text-2xl font-bold uppercase tracking-widest">Waiting for orders...</p>
        </div>
    </div>

    <audio id="ding" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        // 1. YOUR SECRETS (Keep these as they are)
const PUSHER_KEY = 'e0651c53560aef3e6009';
const PUSHER_SECRET = '9e6495e65cd91760b544';

// 2. CONNECT TO PUSHER
const pusher = new Pusher(PUSHER_KEY, { 
    cluster: 'ap2',
    channelAuthorization: {
        customHandler: (params, callback) => {
            const stringToSign = params.socketId + ':' + params.channelName;
            const hash = CryptoJS.HmacSHA256(stringToSign, PUSHER_SECRET);
            const auth = PUSHER_KEY + ':' + hash.toString(CryptoJS.enc.Hex);
            callback(null, { auth: auth });
        }
    }
});

pusher.connection.bind('connected', () => {
    document.getElementById('status-text').innerText = "System Online";
});

const channel = pusher.subscribe('private-orders');

// ---------------------------------------------------------
// NEW MEMORY LOGIC STARTS HERE
// ---------------------------------------------------------

// 3. Load existing orders from memory (or start empty)
let activeOrders = JSON.parse(localStorage.getItem('juiceOrders')) || [];

// 4. Function to draw all orders on the screen
function renderOrders() {
    const list = document.getElementById('order-list');
    list.innerHTML = ''; // Clear the board

    // Hide or show the "Waiting for orders..." text
    if (activeOrders.length === 0) {
        document.getElementById('no-orders').classList.remove('hidden');
    } else {
        document.getElementById('no-orders').classList.add('hidden');
    }

    // Loop through memory and draw each card
    activeOrders.forEach(order => {
        const card = document.createElement('div');
        card.className = "bg-gray-800 p-6 rounded-3xl border-t-8 border-orange-500 shadow-2xl mb-4 transform transition-all";
        
        let itemsHTML = order.items.map(i => `
            <li class="flex flex-col border-b border-gray-700 pb-2">
                <span class="text-xl font-bold text-white">🥤 ${i.item}</span>
                <span class="text-sm text-orange-300 font-medium italic">${i.note}</span>
            </li>
        `).join('');

        card.innerHTML = `
            <div class="flex justify-between items-start mb-4">
                <span class="text-3xl font-black text-orange-500">#${order.token}</span>
                <span class="text-xs text-gray-500 font-mono">${order.time}</span>
            </div>
            <ul class="space-y-4 mb-8">${itemsHTML}</ul>
            <button onclick="markAsServed('${order.token}')" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-black uppercase tracking-widest transition">
                Served ✅
            </button>
        `;
        // Put newest orders at the top
        list.prepend(card); 
    });
}

// 5. Function to delete an order when "Served" is clicked
window.markAsServed = function(tokenToRemove) {
    // Filter out the token we just served
    activeOrders = activeOrders.filter(order => order.token !== tokenToRemove);
    // Save the updated list back to memory
    localStorage.setItem('juiceOrders', JSON.stringify(activeOrders));
    // Redraw the screen
    renderOrders();
};

// 6. When a new order arrives from the customer's phone
channel.bind('client-new-order', function(data) {
    // Play the sound
    const audio = document.getElementById('ding');
    audio.play().catch(e => console.log("Audio play prevented"));

    // Add a timestamp to the data
    data.time = new Date().toLocaleTimeString();
    
    // Push to our array and save to local memory
    activeOrders.push(data);
    localStorage.setItem('juiceOrders', JSON.stringify(activeOrders));
    
    // Redraw the screen to show the new order
    renderOrders();
});

// 7. Draw whatever is in memory the moment the page loads
renderOrders();
    </script>
</body>

</html>
